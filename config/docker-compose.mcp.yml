# Extend your existing docker-compose.yml with:
# docker compose -f docker-compose.yml -f config/docker-compose.mcp.yml up -d

services:
  evc-mesh-mcp:
    image: ghcr.io/entire-vc/evc-mesh-mcp:latest
    ports:
      - "8081:8081"
    environment:
      MESH_MCP_TRANSPORT: sse
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: mesh
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: mesh
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NATS_URL: nats://nats:4222
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: mesh-artifacts
    depends_on:
      - postgres
      - redis
      - nats
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/mcp/health"]
      interval: 30s
      timeout: 5s
      retries: 3
